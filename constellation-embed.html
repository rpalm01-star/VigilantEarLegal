<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">

<style>
  .markdown-body {
    background-color: #000000;
    color: #c9d1d9;
    font-size: 16px;
    line-height: 1.6;
  }
  .markdown-body h1, .markdown-body h2, .markdown-body h3,
  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    color: #58a6ff;
  }
  .markdown-body a {
    color: #58a6ff;
  }
  .markdown-body code, .markdown-body pre {
    background-color: #161b22;
    color: #c9d1d9;
  }
  .markdown-body pre {
    padding: 16px;
    border-radius: 6px;
    overflow-x: auto;
  }
  .markdown-body table {
    display: block;
    overflow-x: auto;
    color: #e6edf3;
    border-color: #3b3d42;
  }
  .markdown-body table th,
  .markdown-body table td {
    color: #e6edf3 !important;
    background-color: #161b22;
    border-color: #3b3d42;
  }
  .markdown-body table th {
    background-color: #21262d;
    font-weight: 600;
  }
  .markdown-body table tr:nth-child(2n) td {
    background-color: #0d1117;
  }
  .markdown-body blockquote {
    border-left-color: #3b3d42;
    color: #8b949e;
  }
</style>

<div id="document-container" class="markdown-body"
     style="width: 100%; min-height: 600px; padding: 40px; box-sizing: border-box; background: #000000;">
  <p style="color:#8b949e; text-align:center;">Loading...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<script>
  const rawUrl = "https://raw.githubusercontent.com/rpalm01-star/VigilantEarLegal/main/constellation.md";

  function escapeHtml(text) {
    if (typeof text !== "string") return String(text || "");
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  const renderer = new marked.Renderer();
  renderer.code = function(code, infostring) {
    const lang = (infostring || "").toLowerCase().trim();
    if (lang === "mermaid") {
      return "<pre class=\"mermaid\">" + code + "</pre>";
    }
    return "<pre><code class=\"language-" + lang + "\">" + escapeHtml(code) + "</code></pre>";
  };

  mermaid.initialize({
    startOnLoad: false,
    theme: "dark",
    flowchart: { useMaxWidth: true }
  });

  async function renderDocument() {
    const container = document.getElementById("document-container");
    if (!container) {
      document.body.innerHTML = "<p style=\"color:#ff6b6b;padding:40px;\">Embed error: document-container not found. Check for smart quotes in the embed HTML.</p>";
      return;
    }

    try {
      container.innerHTML = "<p style=\"color:#8b949e; text-align:center;\">Loading latest .md file from GitHub...</p>";

      const response = await fetch(rawUrl);
      if (!response.ok) {
        throw new Error("HTTP " + response.status + " - repo must be public and file must exist on main");
      }

      const markdown = await response.text();
      container.innerHTML = marked.parse(markdown, { renderer });

      try {
        await mermaid.run({ querySelector: ".mermaid" });
      } catch (mermaidErr) {
        console.warn("Mermaid render failed; markdown still shown.", mermaidErr);
      }
    } catch (err) {
      console.error(err);
      container.innerHTML =
        "<p style=\"color:#ff6b6b; padding:40px; font-family:monospace; background:#2a1f1f; border:2px solid #ff6b6b; border-radius:8px;\">" +
        "Could not load document from GitHub.<br><br>" +
        "Tried: <strong>" + rawUrl + "</strong><br><br>" +
        escapeHtml(err.message) +
        "</p>";
    }
  }

  renderDocument();
</script>
